<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Smart Discount</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <h1>💸 Smart Discount</h1>
    <button id="modeToggle">🌙</button>
  </div>

  <div class="inputs">
    <input type="number" id="price" placeholder="السعر (جنيه)">
    <input type="number" id="discount" placeholder="نسبة الخصم %" value="23">
  </div>

  <div class="buttons">
    <button onclick="resetApp()">Reset</button>
  </div>

  <div class="result" id="result">
    <p>💸 قيمة الخصم: --</p>
    <p>💰 السعر النهائي: --</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
